services:
  postgres:
    image: postgres:17-alpine
    container_name: bp-postgres
    environment:
      POSTGRES_DB: bp
      POSTGRES_USER: bp
      POSTGRES_PASSWORD: bp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bp -d bp"]
      interval: 5s
      timeout: 3s
      retries: 10

  full-stack-bp-api:
    build:
      context: ./full-stack-bp-api
    container_name: bp-full-stack-bp-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bp
      SPRING_DATASOURCE_USERNAME: bp
      SPRING_DATASOURCE_PASSWORD: bp
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/actuator/health/readiness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  full-stack-bp-ui:
    build:
      context: ./full-stack-bp-ui
    container_name: bp-full-stack-bp-ui
    depends_on:
      full-stack-bp-api:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres-data:
