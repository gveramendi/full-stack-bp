<form [formGroup]="form" (ngSubmit)="onSubmit()" class="client-form">
  <div class="form-grid">
    <div class="form-field" [class.form-field--invalid]="hasError('clientId')">
      <label class="form-field__label" for="clientId">Client ID</label>
      <input
        id="clientId"
        class="form-field__input"
        type="text"
        formControlName="clientId"
      />
      @if (hasError('clientId')) {
        <span class="form-field__error">Client ID is required</span>
      }
    </div>

    <div class="form-field" [class.form-field--invalid]="hasError('name')">
      <label class="form-field__label" for="name">Name</label>
      <input
        id="name"
        class="form-field__input"
        type="text"
        formControlName="name"
      />
      @if (hasError('name')) {
        <span class="form-field__error">Name is required</span>
      }
    </div>

    <div class="form-field" [class.form-field--invalid]="hasError('identification')">
      <label class="form-field__label" for="identification">Identification</label>
      <input
        id="identification"
        class="form-field__input"
        type="text"
        formControlName="identification"
      />
      @if (hasError('identification')) {
        <span class="form-field__error">Identification is required</span>
      }
    </div>

    <div class="form-field" [class.form-field--invalid]="hasError('age')">
      <label class="form-field__label" for="age">Age</label>
      <input
        id="age"
        class="form-field__input"
        type="number"
        formControlName="age"
      />
      @if (hasError('age')) {
        <span class="form-field__error">Age must be between 0 and 150</span>
      }
    </div>

    <div class="form-field">
      <label class="form-field__label" for="gender">Gender</label>
      <select id="gender" class="form-field__select" formControlName="gender">
        @for (g of genderOptions; track g) {
          <option [value]="g">{{ g }}</option>
        }
      </select>
    </div>

    <div class="form-field">
      <label class="form-field__label" for="status">Status</label>
      <select id="status" class="form-field__select" formControlName="status">
        @for (s of statusOptions; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div class="form-field form-field--wide">
      <label class="form-field__label" for="address">Address</label>
      <input
        id="address"
        class="form-field__input"
        type="text"
        formControlName="address"
      />
    </div>

    <div class="form-field">
      <label class="form-field__label" for="phone">Phone</label>
      <input
        id="phone"
        class="form-field__input"
        type="text"
        formControlName="phone"
      />
    </div>

    <div class="form-field" [class.form-field--invalid]="hasError('password')">
      <label class="form-field__label" for="password">
        @if (isEdit()) { New password (leave blank to keep) } @else { Password }
      </label>
      <input
        id="password"
        class="form-field__input"
        type="password"
        formControlName="password"
        autocomplete="new-password"
      />
      @if (hasError('password')) {
        <span class="form-field__error">Password is required (min 4 chars)</span>
      }
    </div>
  </div>

  <div class="client-form__actions">
    <button type="button" class="btn btn--secondary" (click)="cancel.emit()" [disabled]="submitting()">
      Cancel
    </button>
    <button type="submit" class="btn btn--primary" [disabled]="submitting()">
      {{ isEdit() ? 'Save changes' : 'Create' }}
    </button>
  </div>
</form>
