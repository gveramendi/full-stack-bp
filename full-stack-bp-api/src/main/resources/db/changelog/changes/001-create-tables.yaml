databaseChangeLog:
  - changeSet:
      id: 001-create-clients
      author: bp-team
      changes:
        - createTable:
            tableName: clients
            columns:
              - column:
                  name: client_id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_clients
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: age
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: identification
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_clients_identification
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(255)
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-create-accounts
      author: bp-team
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_accounts
                    nullable: false
              - column:
                  name: account_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_accounts_account_number
              - column:
                  name: account_type
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: initial_balance
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: current_balance
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: client_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_accounts_client
                    references: clients(client_id)
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: ix_accounts_client_id
            tableName: accounts
            columns:
              - column:
                  name: client_id

  - changeSet:
      id: 001-create-movements
      author: bp-team
      changes:
        - createTable:
            tableName: movements
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_movements
                    nullable: false
              - column:
                  name: date
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: movement_type
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: movement_value
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_movements_account
                    references: accounts(id)
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: ix_movements_account_id
            tableName: movements
            columns:
              - column:
                  name: account_id
        - createIndex:
            indexName: ix_movements_date
            tableName: movements
            columns:
              - column:
                  name: date
