databaseChangeLog:
  # Seed data taken from docs/images/. Only runs when context "seed" is active
  # (configured in application.properties via spring.liquibase.contexts=seed).
  # Tests do not activate this context, so the seed is skipped during testing.

  - changeSet:
      id: 002-seed-clients
      author: bp-team
      context: seed
      changes:
        - insert:
            tableName: clients
            columns:
              - column: { name: client_id, value: jlema }
              - column: { name: name, value: Jose Lema }
              - column: { name: gender, value: MALE }
              - column: { name: age, valueNumeric: 35 }
              - column: { name: identification, value: '1700000001' }
              - column: { name: address, value: Otavalo sn y principal }
              - column: { name: phone, value: '098254785' }
              - column: { name: password, value: '$2a$10$clJTNeMYFWoSzXi9FQ9dyeV9EfVFqwVjwmucJPNBKV5Xht85o4Q3m' }
              - column: { name: status, value: ACTIVE }
              - column: { name: created_at, valueComputed: NOW() }
              - column: { name: updated_at, valueComputed: NOW() }
